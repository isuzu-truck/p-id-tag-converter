<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章&lt;P&gt;段落タグ付けツール</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 20px auto; padding: 0 20px; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .settings { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; background: #eef2f3; padding: 15px; border-radius: 5px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        textarea { width: 100%; height: 200px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; }
        
        .button-group { display: flex; gap: 10px; align-items: center; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        button.copy-btn { background-color: #28a745; }
        button.copy-btn:hover { background-color: #218838; }
        
        .output-header { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 20px; margin-bottom: 5px; }
        #output { background-color: #f8f8f8; white-space: pre-wrap; word-wrap: break-word; border: 1px dashed #aaa; padding: 15px; min-height: 50px; }
        .copy-msg { color: #28a745; font-size: 0.8rem; font-weight: bold; margin-left: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>文章&lt;P&gt;段落タグ付けツール</h2>
    
    <div class="settings">
        <div class="field">
            <label for="prefix">IDの接頭辞</label>
            <input type="text" id="prefix" value="p" placeholder="例: p">
        </div>
        <div class="field">
            <label for="startNum">開始番号</label>
            <input type="number" id="startNum" value="1" min="0">
        </div>
    </div>

    <label for="inputText">変換したい文章を入力してください：</label>
    <textarea id="inputText" placeholder="ここに文章をペーストしてください..."></textarea>
    
    <div class="button-group">
        <button onclick="convertText()">タグ付け実行</button>
    </div>

    <div class="output-container">
        <div class="output-header">
            <label>結果：</label>
            <div>
                <span id="copyMessage" class="copy-msg">コピーしました！</span>
                <button class="copy-btn" onclick="copyToClipboard()">結果をコピー</button>
            </div>
        </div>
        <div id="output">変換結果がここに表示されます</div>
    </div>
</div>

<script>
    function convertText() {
        const text = document.getElementById('inputText').value;
        const prefix = document.getElementById('prefix').value;
        let currentNum = parseInt(document.getElementById('startNum').value, 10);
        
        if (isNaN(currentNum)) currentNum = 1;

        const lines = text.split(/\n+/);
        
        const result = lines.map(line => {
            if (line.trim() === "") return ""; 
            
            const formattedNum = String(currentNum).padStart(4, '0');
            const taggedLine = `<p id="${prefix}-${formattedNum}">${line.trim()}</p>`;
            
            currentNum++;
            return taggedLine;
        }).filter(line => line !== "").join('\n');

        document.getElementById('output').textContent = result;
    }

    function copyToClipboard() {
        const outputText = document.getElementById('output').textContent;
        
        // 変換結果がデフォルトのまま、または空の場合はコピーしない
        if (outputText === "" || outputText === "変換結果がここに表示されます") {
            return;
        }

        // クリップボードに書き込み
        navigator.clipboard.writeText(outputText).then(() => {
            const msg = document.getElementById('copyMessage');
            msg.style.display = 'inline';
            
            // 2秒後に「コピーしました！」を消す
            setTimeout(() => {
                msg.style.display = 'none';
            }, 2000);
        }).catch(err => {
            console.error('コピーに失敗しました: ', err);
            alert('コピーに失敗しました。');
        });
    }
</script>

</body>
</html>
